name: Build, Push to Docker Hub & Deploy to EC2

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build & Push image to Docker Hub
      - name: Build and Push Docker image
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:latest .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:latest

      # SSH into EC2, pull image from Docker Hub, and run
      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Pull latest image from Docker Hub
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:latest

            # Stop & remove old container if running
            docker stop cicd-app 2>/dev/null || true
            docker rm cicd-app 2>/dev/null || true

            # Run new container
            docker run -d --name cicd-app --restart unless-stopped -p 3000:3000 ${{ secrets.DOCKERHUB_USERNAME }}/cicd-app:latest


